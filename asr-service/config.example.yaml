# ASR 服务配置
# 复制为 config.yaml 后修改;所有字段都支持环境变量覆盖(以 ASR_ 为前缀,见下表)
#
# 字段              覆盖变量                  说明
# model             ASR_MODEL                 faster-whisper 模型
# device            ASR_DEVICE                cpu | cuda
# compute_type      ASR_COMPUTE_TYPE          int8
# language          ASR_LANGUAGE              默认 zh;空串表示自动检测
# beam_size         ASR_BEAM_SIZE
# vad_filter        ASR_VAD_FILTER            true | false
#
# 注意:说话人识别(diarization)已拆出到 ../diarize-service/,
# 本服务只做转写。配置文件中如有 'diarize' 字段会被忽略并打 warning。

asr:
  model: small
  device: cpu
  compute_type: int8
  language: zh
  beam_size: 5
  vad_filter: true

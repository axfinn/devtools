services:
  devtools:
    build:
      context: .
      args:
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - http_proxy=
        - https_proxy=
    env_file:
      - path: .env
        required: false
    container_name: devtools
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8082}:8082"
    volumes:
      - devtools-data:/app/data
      - autodev-claude-data:/home/autodev/.claude
      - autodev-codex-data:/home/autodev/.codex
      - ${HOME}/.codex:/tmp/host-codex:ro
      - ./backend:/app/config-src:ro
    environment:
      - CONFIG_PATH=/app/config.yaml
      - PORT=8082
      - DB_PATH=/app/data/paste.db
      - REDIS_ENABLED=true
      - REDIS_ADDR=redis:6379
      - TZ=Asia/Shanghai
      - OCR_SERVICE_URL=http://ocr-service:8000
      - no_proxy=ocr-service,redis,devtools,api.minimaxi.com,host.docker.internal,192.168.65.254
      - NO_PROXY=ocr-service,redis,devtools,api.minimaxi.com,host.docker.internal,192.168.65.254
      - AUTODEV_PATH=/app/data/clawtest/autodev/autodev
      - AUTODEV_DATA_DIR=/app/data/autodev
    depends_on:
      redis:
        condition: service_healthy
      ocr-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: devtools-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - devtools-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  ocr-service:
    build:
      context: ./ocr-service
      args:
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - http_proxy=
        - https_proxy=
        - NO_PROXY=
        - no_proxy=
    container_name: ocr-service
    restart: unless-stopped
    volumes:
      - ocr-model-cache:/root/.cache
    environment:
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=
      - no_proxy=
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  devtools-data:
    driver: local
  # 持久化 autodev 用户的 Claude 配置和 skills，重建镜像不丢失
  autodev-claude-data:
    driver: local
  # 持久化 autodev 用户的 Codex 配置；启动时会优先从宿主机 ~/.codex 同步必要文件
  autodev-codex-data:
    driver: local
  devtools-redis-data:
    driver: local
  ocr-model-cache:
    driver: local

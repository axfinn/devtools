services:
  devtools:
    build:
      context: .
      args:
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - http_proxy=
        - https_proxy=
    env_file:
      - path: .env
        required: false
    container_name: devtools
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8082}:8082"
    volumes:
      - devtools-data:/app/data
      - autodev-claude-data:/home/autodev/.claude
      - autodev-codex-data:/home/autodev/.codex
      - ${HOME}/.codex:/tmp/host-codex:ro
      - ./backend/config.yaml:/app/config.yaml:ro
    environment:
      - PORT=8082
      - DB_PATH=/app/data/paste.db
      - TZ=Asia/Shanghai
      - OCR_SERVICE_URL=http://ocr-service:8000
      - no_proxy=ocr-service,devtools,api.minimaxi.com
      - NO_PROXY=ocr-service,devtools,api.minimaxi.com
      - AUTODEV_PATH=/app/data/clawtest/autodev/autodev
      - AUTODEV_DATA_DIR=/app/data/autodev
    depends_on:
      ocr-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  ocr-service:
    build:
      context: ./ocr-service
    container_name: ocr-service
    restart: unless-stopped
    volumes:
      - ocr-model-cache:/root/.cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  devtools-data:
    driver: local
  # 持久化 autodev 用户的 Claude 配置和 skills，重建镜像不丢失
  autodev-claude-data:
    driver: local
  # 持久化 autodev 用户的 Codex 配置；启动时会优先从宿主机 ~/.codex 同步必要文件
  autodev-codex-data:
    driver: local
  ocr-model-cache:
    driver: local

services:
  devtools:
    build:
      context: .
      args:
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - http_proxy=
        - https_proxy=
    container_name: devtools
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8082}:8082"
    volumes:
      - devtools-data:/app/data
      - ./backend/config.yaml:/app/config.yaml:ro
    environment:
      - PORT=8082
      - DB_PATH=/app/data/paste.db
      - TZ=Asia/Shanghai
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OCR_SERVICE_URL=http://ocr-service:8000
      - no_proxy=ocr-service,devtools
      - NO_PROXY=ocr-service,devtools
    depends_on:
      ocr-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  ocr-service:
    build:
      context: ./ocr-service
    container_name: ocr-service
    restart: unless-stopped
    volumes:
      - ocr-model-cache:/root/.cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  devtools-data:
    driver: local
  ocr-model-cache:
    driver: local

services:
  devtools:
    build:
      context: .
      args:
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - http_proxy=
        - https_proxy=
    env_file:
      - path: .env
        required: false
    container_name: devtools
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8082}:8082"
    volumes:
      - devtools-data:/app/data
      - autodev-claude-data:/home/autodev/.claude
      - autodev-codex-data:/home/autodev/.codex
      - ${HOME}/.codex:/tmp/host-codex:ro
      - ./backend:/app/config-src:ro
    environment:
      - CONFIG_PATH=/app/config.yaml
      - PORT=8082
      - DB_PATH=/app/data/paste.db
      - REDIS_ENABLED=true
      - REDIS_ADDR=redis:6379
      - TZ=Asia/Shanghai
      - OCR_SERVICE_URL=http://ocr-service:8000
      - ASR_SERVICE_URL=http://asr-service:9000
      # 说话人识别(diarize-service):独立部署在 Windows / 其他主机时填外部 URL。
      # 留空表示禁用,基础 ASR 仍正常工作,只是不会带说话人标签。
      # 示例:DIARIZE_SERVICE_URL=http://host.docker.internal:9100
      - DIARIZE_SERVICE_URL=${DIARIZE_SERVICE_URL:-}
      - no_proxy=ocr-service,asr-service,redis,devtools,api.minimaxi.com,host.docker.internal,192.168.65.254
      - NO_PROXY=ocr-service,asr-service,redis,devtools,api.minimaxi.com,host.docker.internal,192.168.65.254
      - AUTODEV_PATH=/app/data/clawtest/autodev/autodev
      - AUTODEV_DATA_DIR=/app/data/autodev
    depends_on:
      redis:
        condition: service_started
      ocr-service:
        condition: service_started
      asr-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "http_proxy= https_proxy= HTTP_PROXY= HTTPS_PROXY= wget --no-verbose --tries=1 --spider http://localhost:8082/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: devtools-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - devtools-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  ocr-service:
    build:
      context: ./ocr-service
      args:
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - http_proxy=
        - https_proxy=
        - NO_PROXY=
        - no_proxy=
    container_name: ocr-service
    restart: unless-stopped
    volumes:
      - ocr-model-cache:/root/.cache
    environment:
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=
      - no_proxy=
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 180s

  asr-service:
    build:
      context: ./asr-service
      args:
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - http_proxy=
        - https_proxy=
        - NO_PROXY=
        - no_proxy=
    container_name: asr-service
    restart: unless-stopped
    volumes:
      - asr-model-cache:/root/.cache/huggingface
    environment:
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - http_proxy=
      - https_proxy=
      - NO_PROXY=
      - no_proxy=
      # ASR 服务配置(也支持 asr-service/config.yaml 覆盖,详见 asr-service/config.example.yaml)
      # 注意:说话人识别已拆到独立服务 ../diarize-service/,不在此处配置
      - ASR_MODEL=${ASR_MODEL:-small}
      - ASR_DEVICE=${ASR_DEVICE:-cpu}
      - ASR_COMPUTE_TYPE=${ASR_COMPUTE_TYPE:-int8}
      - ASR_LANGUAGE=${ASR_LANGUAGE:-zh}
      - ASR_BEAM_SIZE=${ASR_BEAM_SIZE:-5}
      - ASR_VAD_FILTER=${ASR_VAD_FILTER:-true}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 240s

volumes:
  devtools-data:
    driver: local
  # 持久化 autodev 用户的 Claude 配置和 skills，重建镜像不丢失
  autodev-claude-data:
    driver: local
  # 持久化 autodev 用户的 Codex 配置；启动时会优先从宿主机 ~/.codex 同步必要文件
  autodev-codex-data:
    driver: local
  devtools-redis-data:
    driver: local
  ocr-model-cache:
    driver: local
  asr-model-cache:
    driver: local

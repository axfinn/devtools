# DevTools 配置文件
# 复制此文件为 config.yaml 并修改

# 服务器配置
server:
  port: "8080"        # 服务端口（也可通过环境变量 PORT 设置）
  mode: "release"     # 运行模式: debug, release

# 数据库配置
database:
  path: "./data/paste.db"  # 数据库文件路径（也可通过环境变量 DB_PATH 设置）
  max_connections: 10       # 最大数据库连接数

# Redis 瞬时状态存储
redis:
  # 启用后，限流、图像理解任务状态、Paste 分片上传状态将转存到 Redis
  enabled: false
  # Redis 地址；Docker Compose 下建议用 redis:6379
  addr: "127.0.0.1:6379"
  # Redis 密码；未设置密码时留空
  password: ""
  # Redis DB
  db: 0
  # Key 前缀，避免和其他业务混用时冲突
  key_prefix: "devtools:"
  # 图像任务状态保留时长（小时）
  image_task_ttl_hours: 168
  # 分片上传状态保留时长（小时）
  chunk_upload_ttl_hours: 24

# 安全配置
security:
  # CORS 允许的来源（生产环境建议设置具体域名）
  cors_origins:
    - "*"
    # - "https://yourdomain.com"
    # - "http://localhost:5173"
  bcrypt_cost: 10  # Bcrypt 加密强度（10-12 推荐）

# 限流配置
rate_limit:
  enabled: true             # 是否启用限流
  create_per_minute: 10     # 创建操作每分钟限制次数

# 内容大小限制
limits:
  paste_max_content_size: 10485760      # 粘贴板最大文本大小（10MB）
  paste_max_images: 15                # 粘贴板最大图片数量
  paste_max_total_size: 52428800      # 粘贴板总大小（50MB）
  max_upload_size: 209715200           # 最大上传文件大小（200MB，支持大文件上传）

# 短链服务配置
shorturl:
  # 管理密码（用于自定义短链ID）
  # 留空 = 普通模式，只能随机ID，有速率限制
  # 设置密码 = 可使用自定义ID如 /s/1 /s/abc，无速率限制
  password: ""

# 粘贴板配置
paste:
  # 管理员密码（可设置更多访问次数或永久访问）
  # 留空 = 视频默认10次访问限制
  # 设置密码 = 可设置更多次数或永久访问
  admin_password: ""
  # 视频默认最大访问次数
  default_video_max_views: 10
  # 最大文件大小（字节），默认200MB
  max_file_size: 209715200

# 聊天室配置
chat:
  # 管理员密码（可管理所有聊天室）
  # 留空 = 无管理员功能
  # 设置密码 = 可查看和删除所有房间
  admin_password: ""

# Markdown 分享配置
mdshare:
  # 管理员密码（可管理所有分享）
  # 留空 = 无管理员功能
  admin_password: ""
  # 默认最大查看次数（2-10）
  default_max_views: 5
  # 默认过期天数
  default_expires_days: 30

# Excalidraw 画图配置
excalidraw:
  # 管理员密码（可永久保存、管理所有画图）
  # 留空 = 无管理员功能
  admin_password: ""
  # 默认过期天数（1-365）
  default_expires_days: 30
  # 最大内容大小（字节），默认10MB
  max_content_size: 10485760

# 孕期管理配置
pregnancy:
  # 默认过期天数（默认365天）
  default_expires_days: 365
  # 最大数据大小（字节），默认1MB
  max_data_size: 1048576

# SSH 终端配置
ssh:
  # 管理员密码（可查看和管理所有 SSH 会话）
  # 留空 = 无管理员功能
  # 设置密码 = 可通过 /api/terminal/admin/list 查看所有会话
  admin_password: ""

  # 是否验证 SSH 主机密钥（推荐启用以防止中间人攻击）
  # true = 首次连接记录主机密钥，后续连接验证
  # false = 接受任何主机密钥（不安全，仅用于测试）
  host_key_verification: true

  # 每个用户最大会话数（防止资源滥用）
  max_sessions_per_user: 10

  # 会话空闲超时（分钟）
  # WebSocket 断开后，如果超过此时间无活动，会自动关闭 SSH 连接
  session_idle_timeout: 5

  # 历史记录最大保存天数
  # 超过此天数的命令历史记录会被自动清理
  history_max_age_days: 30

  # 不活跃会话最大保存天数
  # 超过此天数未活跃的会话（包括数据库记录和历史）会被自动清理
  session_max_age_days: 7

  # SSH 密码加密密钥（Base64 编码的 32 字节密钥）
  # 生成命令: openssl rand -base64 32
  # 重要：设置后不要修改，否则之前保存的 SSH 密码将无法解密
  encryption_key: ""

# 生活记账配置
expense:
  # 默认过期天数（默认365天）
  default_expires_days: 365
  # 最大数据大小（字节），默认1MB
  max_data_size: 1048576

# 血糖监测配置
glucose:
  # 默认过期天数（默认365天）
  default_expires_days: 365

# 工作/生活事项管理配置
planner:
  # 超级管理员密码（可查看和管理全部事项档案）
  admin_password: ""
  # 默认过期天数
  default_expires_days: 365
  # 普通用户最长过期天数
  max_expires_days: 3650
  # 邮件提醒 SMTP（留空则不发送邮件提醒）
  smtp_host: ""
  smtp_port: 465
  smtp_user: ""
  smtp_pass: ""
  # AI 整理 / AI 总结 / AI 规划复用全局 minimax 配置
  # 如未配置 minimax.api_key，将自动退回本地规则建议

# 家庭物品整理模块配置
household:
  # 默认过期天数（默认365天）
  default_expires_days: 365

# 档案照片墙配置
photowall:
  # 超级管理员密码（可永久保存、管理全部照片墙档案）
  admin_password: ""
  # 默认过期天数
  default_expires_days: 90
  # 普通用户最长过期天数（半年）
  max_expires_days: 180
  # 单张照片最大大小（MB）
  max_photo_size_mb: 10

# DeepSeek AI 配置（用于记账分析）
deepseek:
  # API Key，从 https://platform.deepseek.com 获取
  # 也可通过环境变量 DEEPSEEK_API_KEY 设置
  api_key: ""
  # 模型名称，支持 deepseek-chat / deepseek-reasoner / deepseek-v4-flash / deepseek-v4-pro
  # 记账、家庭物品、AI Gateway 文本路由都会优先复用这里
  model: "deepseek-chat"

# MiniMax AI 配置（用于事项 AI 整理/总结/规划、血糖智能解析等）
minimax:
  # API Key，从 https://platform.minimax.io 获取
  # 也可通过环境变量 MINIMAX_API_KEY 设置
  # MiniMax Studio 的文本生成也复用这里的 API Key
  api_key: ""
  # 文本默认模型
  # MiniMax Studio 文本页 / 事项管理 AI 总结与规划都会优先复用这里
  model: "abab6.5s-chat"

# MiniMax MCP 配置（图像理解）
minimax_mcp:
  # MCP API Key（支持环境变量 MINIMAX_MCP_API_KEY）
  api_key: ""
  # MCP API Host
  api_host: "https://api.minimaxi.com"
  # MCP Server 启动命令
  command: "uvx"
  # MCP Server 启动参数
  args:
    - "minimax-coding-plan-mcp"
  # 请求超时（秒）
  timeout_seconds: 600
  # 传输协议: line（JSON 行） 或 header（Content-Length）
  transport: "line"

# Hermes Agent 接入
hermes:
  # 管理密码。沿用站内工具的管理员密码模式。
  admin_password: ""
  # Hermes Dashboard 地址
  dashboard_url: "http://host.docker.internal:8086"
  # Hermes OpenAI 兼容 API 地址，建议以 /v1 结尾
  api_base_url: "http://host.docker.internal:8642/v1"
  # Hermes API Server 的 Bearer Token
  api_key: ""
  # 默认模型名，一般为 hermes-agent
  model: "hermes-agent"

# MiniMax TTS 配置（语音合成）
# 支持模型（官方模型名）: speech-01-hd, speech-01-turbo, speech-02-hd, speech-02-turbo,
#                         speech-2.6-hd, speech-2.6-turbo, speech-2.8-hd, speech-2.8-turbo
# API Key 与 minimax.api_key 共用；可通过环境变量 MINIMAX_TTS_API_KEY 覆盖
# MiniMax Studio 的“语音 / 音色”页复用这里
minimax_tts:
  # API Key（留空时自动复用 minimax.api_key）
  api_key: ""
  # TTS 上游地址，默认 https://api.minimaxi.com
  base_url: "https://api.minimaxi.com"

# MiniMax Token Plan 媒体生成配置（TTS HD / Turbo / Hailuo 视频 / Music / Image）
# 支持模型（官方模型名）:
#   TTS: speech-01-hd, speech-01-turbo, speech-02-hd, speech-02-turbo,
#        speech-2.6-hd, speech-2.6-turbo, speech-2.8-hd, speech-2.8-turbo
#   Hailuo: MiniMax-Hailuo-2.3-Fast, MiniMax-Hailuo-2.3, MiniMax-Hailuo-02, T2V-01-Director, T2V-01
#   Music: music-2.5, music-2.6, music-cover
#   Image: image-01, image-01-live
# API Key 与 minimax.api_key 共用；可通过环境变量 MINIMAX_TOKEN_PLAN_API_KEY 覆盖
# MiniMax Studio 的“媒体生成”页复用这里；结果保存分享后媒体会落盘，不需要额外配置
minimax_token_plan:
  # API Key（留空时自动复用 minimax.api_key）
  api_key: ""
  # 上游地址，默认 https://api.minimaxi.com
  base_url: "https://api.minimaxi.com"

# MiniMax Voice Cloning 音色克隆配置
# 支持功能：
#   - 上传音频复刻音色 (POST /api/minimax/voice-cloning/upload)
#   - 获取音色列表 (GET /api/minimax/voice-cloning/voices)
#   - 删除音色 (DELETE /api/minimax/voice-cloning/voices/:id)
#   - 使用音色 TTS (POST /api/minimax/voice-cloning/tts)
# API Key 与 minimax.api_key 共用；可通过环境变量 MINIMAX_VOICE_CLONING_API_KEY 覆盖
# MiniMax Studio / AI Gateway 音色克隆调试页复用这里
minimax_voice_cloning:
  # API Key（留空时自动复用 minimax.api_key）
  api_key: ""
  # 上游地址，默认 https://api.minimaxi.com
  base_url: "https://api.minimaxi.com"

# DashScope 文本模型配置（coding 端点，多品牌聚合）
# 支持模型（通过 /api/ai-gateway/v1/chat/completions 统一调用）：
#   千问: qwen3.5-plus | qwen3-max-2026-01-23 | qwen3-coder-next | qwen3-coder-plus
#   智谱: glm-5 | glm-4.7
#   Kimi: kimi-k2.5
# 注意: 此 API Key 独立于百炼(bailian)，从 https://coding.dashscope.aliyuncs.com 申请
# 也可通过环境变量 DASHSCOPE_API_KEY 设置
dashscope:
  api_key: "sk-sp-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  # API 基础地址，一般无需修改
  base_url: "https://coding.dashscope.aliyuncs.com/v1"

# 图像理解模块（qwen 视觉理解）
# POST /api/image-understanding/qwen-vision — 免 API Key 内部调用（仅限项目同域请求）
# GET  /api/image-understanding/qwen-vision/logs — 查看永久流水（需 X-Image-Admin-Password header）
image_understanding:
  # 查看请求流水的独立管理员密码，独立于 ai_gateway.super_admin_password
  admin_password: ""

# 阿里云百炼图片模型配置
bailian:

    - name: "qwen-image-max"
      type: "text2image"
      enabled: false
      total_quota: 0
      expires_at: ""
      default_size: "1024*1024"
      description: "无免费额度，默认禁用"

# NFS/SMB 文件分享配置
# 仅超管密码可操作，支持指定访问次数和过期时间，超限后禁止访问
# 大文件使用流式传输，不会占用内存
nfs_share:
  # 是否启用（默认关闭）
  enabled: false
  # 超管密码（必填，留空则功能不可用）
  admin_password: ""
  # 单文件最大分享大小（MB），0 = 不限制
  max_file_size_mb: 0
  # 禁止视频文件直接下载（true = 只允许通过 HLS 播放页访问，false = 允许下载）
  disable_video_download: true

  # 挂载点列表（启动时自动挂载，需要系统已安装 nfs-common / cifs-utils）
  mounts:
    # ⚠️  NFS 暂不支持：需要 root/SYS_ADMIN 权限，Docker 部署不适用
    # - name: "project-files"
    #   type: nfs
    #   host: "192.168.1.100"
    #   export: "/exports/data"

    # SMB/CIFS 示例（Windows 网络共享 / Samba，支持用户名密码）
    # 依赖：apt install cifs-utils
    - name: "team-share"
      type: smb
      host: "192.168.1.200"
      share: "TeamDocs"           # 共享名（不含 //host/ 前缀）
      username: "alice"
      password: "secret"
      domain: "CORP"              # 域名，非域账号可留空
      options: "vers=3.0"         # SMB 版本等附加选项（可选）

    # 本地目录示例（直接映射，不执行 mount 命令，path 填 export 字段）
    - name: "local-backup"
      type: local
      export: "/mnt/backup"       # 本地目录路径

# AI Gateway 配置
ai_gateway:
  # 超级管理员密码，用于签发和吊销对外 API Key
  # 也可通过环境变量 AI_GATEWAY_SUPER_ADMIN_PASSWORD 设置
  # MiniMax Studio 的“结果分享 / API”管理台也复用这里：
  # 1. 超管可查看/停用/删除全部 MiniMax 结果分享
  # 2. 结果分享创建接口支持 X-Super-Admin-Password
  # 3. 如果不给超管密码，也可使用 AI Gateway API Key 创建分享
  super_admin_password: ""
  # 新建 API Key 默认有效期（天）
  default_key_expires_days: 90
  # 新建 API Key 默认每小时请求限制
  default_rate_limit_per_hour: 1000
  # 请求明细保留天数
  request_retention_days: 180
  # OpenAI 兼容代理模型配置
  # 也可通过环境变量 AI_GATEWAY_PROXY_API_URL / AI_GATEWAY_PROXY_API_KEY / AI_GATEWAY_PROXY_MODEL / AI_GATEWAY_PROXY_UPSTREAM_MODEL 设置
  proxy:
    # 对外暴露的模型名
    model: "proxy-chat"
    # 上游真实模型名；留空时透传请求里的 model
    upstream_model: ""
    # 代理服务基础地址，通常以 /v1 结尾
    api_url: ""
    # 代理服务 API Key
    api_key: ""
  # Anthropic 协议下游提供商路由配置
  # 通用端点 /api/anthropic/v1/messages 根据 model 自动路由到匹配的下游
  # 不配置时自动使用内置默认值（MiniMax / DashScope / DeepSeek）
  # 管理员新增下游只需添加一个条目：name + api_url + api_key + models 列表
  anthropic_providers:
    - name: "MiniMax"
      api_url: "https://api.minimaxi.com/anthropic"
      api_key: ""   # 留空时复用 minimax.api_key
      models:
        - "MiniMax-M2.5"
        - "MiniMax-M2.5-highspeed"
        - "MiniMax-M2.1"
        - "MiniMax-M2.1-highspeed"
        - "MiniMax-M2"
        - "MiniMax-M2.7"
    - name: "DashScope"
      api_url: "https://coding.dashscope.aliyuncs.com/apps/anthropic"
      api_key: ""   # 留空时复用 dashscope.api_key
      models:
        - "qwen3.5-plus"
        - "qwen3-max-2026-01-23"
        - "qwen3-coder-next"
        - "qwen3-coder-plus"
        - "glm-5"
        - "glm-4.7"
        - "kimi-k2.5"
        - "MiniMax-M2.5"
    - name: "DeepSeek"
      api_url: "https://api.deepseek.com/anthropic"
      api_key: ""   # 留空时复用 deepseek.api_key
      models:
        - "deepseek-chat"
        - "deepseek-reasoner"
        - "deepseek-v4-flash"
        - "deepseek-v4-pro"
  # 计费配置。input/output 单位是每 1000 token 价格；request_cost 用于图片/视频按次计费
  pricing:
    - model: "deepseek-chat"
      provider: "deepseek"
      input_per_1k_tokens: 0
      output_per_1k_tokens: 0
      request_cost: 0
      currency: "CNY"
    - model: "deepseek-reasoner"
      provider: "deepseek"
      input_per_1k_tokens: 0
      output_per_1k_tokens: 0
      request_cost: 0
      currency: "CNY"
    - model: "deepseek-v4-flash"
      provider: "deepseek"
      input_per_1k_tokens: 0
      output_per_1k_tokens: 0
      request_cost: 0
      currency: "CNY"
    - model: "deepseek-v4-pro"
      provider: "deepseek"
      input_per_1k_tokens: 0
      output_per_1k_tokens: 0
      request_cost: 0
      currency: "CNY"
    - model: "abab6.5s-chat"
      provider: "minimax"
      input_per_1k_tokens: 0
      output_per_1k_tokens: 0
      request_cost: 0
      currency: "CNY"
    - model: "proxy-chat"
      provider: "proxy"
      input_per_1k_tokens: 0
      output_per_1k_tokens: 0

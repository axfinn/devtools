      output_per_1k_tokens: 0
      request_cost: 0
      currency: "CNY"
    - model: "proxy-chat"
      provider: "proxy"
      input_per_1k_tokens: 0
      output_per_1k_tokens: 0
      request_cost: 0
      currency: "CNY"
    # DashScope 文本模型计费（按实际价格填写，单位：元/1000 token）

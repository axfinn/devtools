# 控制台配置
# 管理导航模块显隐，需要密码才能进入控制台
console:
  # 控制台管理员密码（留空则控制台不可用）
  admin_password: ""

# 科学上网代理配置
# 支持 Clash 订阅链接或粘贴 YAML 配置，自动测速选最优节点
# 启动后提供 HTTP 代理端口，也支持页面内嵌代理浏览
proxy:
  # 管理员密码（必填，留空则功能不可用）
  admin_password: ""
  # 独立代理端口（供 NPS 映射，绕过 nginx，留空则不启动）
  # 配置后 NPS 工具页面可一键将此端口映射到公网
  tunnel_port: "18080"
  # 本地节点代理固定端口，留空则随机分配
  local_port: "18081"
  # 代理告警/订阅更新通知收件人，留空则不发送
  alert_email: "your@email.com"
  # SMTP 服务器地址，如 smtp.exmail.qq.com / smtp.qq.com / smtp.gmail.com
  smtp_host: "smtp.exmail.qq.com"
  # SMTP 端口：465（SSL）或 587（STARTTLS），企业邮箱通常用 465
  smtp_port: 465
  # 发件人邮箱（SMTP 登录用户名）
  smtp_user: "devtools@your-domain.com"
  # SMTP 授权码/密码（QQ 邮箱需在「设置→账户」生成授权码，不是登录密码）
  smtp_pass: ""
  # 托管订阅自动刷新
  # 用于像 muacloud 这种“主页给最新域名，登录后再拿真实订阅链接”的场景
  subscription_refresh:
    # 是否启用
    enabled: false
    # 刷新间隔（小时）
    interval_hours: 24
    # 落地页，用于每天解析最新入口域名
    landing_url: "https://muacloud.github.io/"
    # 直接面板地址；如果已知固定面板域名，也可以直接填这里，留空则优先解析 landing_url
    site_url: ""
    # 访问站点与订阅时使用的上游 HTTP 代理
    # 示例: http://proxy:123456@host:18080
    request_proxy_url: ""
    # 面板登录邮箱
    login_email: ""
    # 面板登录密码
    login_password: ""
    # 登录接口路径，通常不用改
    login_path: "/auth/login"
    # 用户中心页面路径，通常不用改
    user_path: "/user"
    # 优先提取的订阅类型：clash / clashr / surfboard / shadowrocket / ssr
    preferred_sub_type: "clash"

# NPS 端口映射管理
# 在 NPS 后台创建好客户端后，填入 vkey 即可通过 devtools 快速管理端口映射
nps:
  # NPS 管理后台地址（含端口）
  server_url: "http://your-nps-server:8080"
  # NPS 配置文件里的 auth_key
  auth_key: ""
  # 客户端验证密钥（已在 NPS 后台创建好的客户端 vkey）
  # 填写后服务启动时会自动在容器内运行 npc，连接 NPS 服务端
  vkey: ""
  # npc 连接的 bridge 主机，留空则自动从 server_url 提取 hostname
  # 如果 bridge 和 web 管理后台不是同一个域名，在这里单独填
  bridge_host: ""
  # npc 连接 NPS 的 bridge 端口（默认 8024，通常不需要改）
  bridge_port: "8024"
  # devtools 访问密码（留空则功能不可用）
  admin_password: ""
  # 自动分配端口区间（添加映射时不填端口则自动从此区间分配，0 表示不启用）
  port_range_start: 10000
  port_range_end: 20000

      type: "multimodal"
      enabled: true
      total_quota: 100
      expires_at: "2026-06-01"
      default_size: "1328x1328"
      description: "文生图/图像编辑，同步接口"
    - name: "qwen-image-2.0-pro-2026-03-03"
      type: "multimodal"
      enabled: true
      total_quota: 100
      expires_at: "2026-06-01"
      default_size: "1328x1328"
      description: "快照版本"
    - name: "qwen-image-2.0-2026-03-03"
      type: "multimodal"
      enabled: true
      total_quota: 100
      expires_at: "2026-06-01"
      default_size: "1328x1328"
      description: "快照版本"
    - name: "qwen-image-plus-2026-01-09"
      type: "text2image"
      enabled: true
      total_quota: 100
